  <text class="core-big" font-size="19" id="svg_44" text-anchor="middle" x="325.17" y="193.05">DIGITAL TWINS</text>
  <text class="core-cap" font-size="11" id="svg_45" text-anchor="middle" x="325.17" y="212.42">in Healthcare</text>
  <text class="eyebrow" font-size="11" id="svg_46" x="75.14" y="231.13">APPLIED OUTWARD</text>
  <g fill="none" id="svg_47" stroke="#b03a2e" stroke-width="1.6" transform="translate(0.909091, -55.4545) translate(0, 1) translate(0, 1) translate(0, 1) translate(0, 1) translate(0, 1) translate(0, 1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) translate(0, -1) matrix(1, 0, 0, 1, -15.7337, -51.1339)">
