<?xml version="1.0"?>
<svg width="650" height="380" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg" display="block">
 <title id="rs-title">Research strategy: one computational engine applied across the vascular system</title>
 <desc id="rs-desc">Three computational capabilities converge into one predictive engine (trustworthy Digital Twins in Healthcare), which is then applied outward across the vascular system from cells to vessels to implanted devices.</desc>
 <!-- ============ THEME (edit palette here) ============ -->
 <style>:root{
      --ink:#16233b; --muted:#5b6675; --body:#48505f; --line:#dde3ec;
      --cool:#1b4f72; --cool-2:#2874a6; --cool-bg:#eef4f9; --cool-stroke:#d3e2ee;
      --cell:#922b21;   --cell-bg:#f7ece9;   --cell-stroke:#eed7d1;
      --vessel:#c0392b; --vessel-bg:#fcecea; --vessel-stroke:#f3d6d2;
      --device:#ca6f1e; --device-bg:#fbf2e4; --device-stroke:#f0dfc4;
    }
    .eyebrow{font-size:11px;font-weight:700;letter-spacing:.11em;fill:var(--muted);}
    .ctitle{font-size:16px;font-weight:700;fill:var(--ink);}
    .cbody{font-size:14.5px;font-weight:400;fill:var(--body);}
    .tag{font-size:12.5px;font-weight:500;
         font-family:ui-monospace,&#x27;SF Mono&#x27;,&#x27;Cascadia Code&#x27;,Menlo,Consolas,monospace;}
    .core-cap{font-size:13px;font-weight:600;letter-spacing:.15em;fill:#ffffff;fill-opacity:.85;}
    .core-big{font-size:24px;font-weight:800;fill:#ffffff;letter-spacing:.01em;}
    .axis{font-size:11px;font-weight:500;letter-spacing:.06em;fill:var(--muted);
          font-family:ui-monospace,&#x27;SF Mono&#x27;,Menlo,Consolas,monospace;}</style>
 <defs>
  <marker id="arrowCool" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="8" refY="5" viewBox="0 0 10 10">
   <path d="m0,1l9,4l-9,4l0,-8z" fill="#2874a6" id="svg_1"/>
  </marker>
  <marker id="arrowWarm" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="8" refY="5" viewBox="0 0 10 10">
   <path d="m0,1l9,4l-9,4l0,-8z" fill="#b03a2e" id="svg_2"/>
  </marker>
  <linearGradient id="coreGrad" x1="0" x2="1" y1="0" y2="0.15">
   <stop offset="0" stop-color="#1b4f72"/>
   <stop offset="0.52" stop-color="#6b3a6e"/>
   <stop offset="1" stop-color="#922b21"/>
  </linearGradient>
 </defs>
