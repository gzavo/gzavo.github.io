 <!-- ============ AXIS CAPTION ============ -->
 <g class="layer">
  <title>Layer 1</title>
  <text class="eyebrow" font-size="11" id="svg_3" transform="matrix(1, 0, 0, 1, 0, 0)" x="71.02" y="140.91">COMPUTATIONAL CORE</text>
  <rect fill="var(--cool-bg)" height="140" id="svg_5" rx="12" stroke="var(--cool-stroke)" transform="translate(3.81172, 148.321) scale(1, 0.629032) translate(-3.81172, -148.321) matrix(1, 0, 0, 1, 4.26627, 7.8661)" width="200" x="0.91" y="-88.16"/>
  <text class="ctitle" font-size="16" id="svg_16" transform="matrix(1, 0, 0, 1, 4.26627, 7.8661)" x="14.91" y="16.55">Large-scale computing</text>
  <text class="tag" fill="var(--cool-2)" font-size="12.5" id="svg_17" transform="matrix(1, 0, 0, 1, 4.26627, 7.8661)" x="16.91" y="34.55">&gt;80% eff · 300k+ cores</text>
  <text class="cbody" font-size="14.5" id="svg_18" transform="matrix(1, 0, 0, 1, 4.26627, 7.8661)" x="16.91" y="54.55">Cell-resolved blood flow,</text>
  <text class="cbody" font-size="14.5" id="svg_19" transform="matrix(1, 0, 0, 1, 4.26627, 7.8661)" x="16.91" y="70.55">beyond experiment&#x27;s reach.</text>
  <rect fill="var(--cool-bg)" height="140" id="svg_21" rx="12" stroke="var(--cool-stroke)" transform="translate(223.811, 148.321) scale(1, 0.635484) translate(-223.811, -148.321) matrix(1, 0, 0, 1, 224.266, 7.8661)" width="200" x="0.91" y="-87.26"/>
  <text class="ctitle" font-size="16" id="svg_26" transform="matrix(1, 0, 0, 1, 224.266, 7.8661)" x="16.91" y="16.55">Multiscale modelling</text>
  <text class="tag" fill="var(--cool-2)" font-size="12.5" id="svg_27" transform="matrix(1, 0, 0, 1, 224.266, 7.8661)" x="16.91" y="34.55">molecule → cell → vessel</text>
  <text class="cbody" font-size="14.5" id="svg_28" transform="matrix(1, 0, 0, 1, 224.266, 7.8661)" x="16.91" y="54.55">From molecules to whole</text>
  <text class="cbody" font-size="14.5" id="svg_29" transform="matrix(1, 0, 0, 1, 224.266, 7.8661)" x="16.91" y="70.55">vessels, in one pipeline.</text>
  <rect fill="var(--cool-bg)" height="140" id="svg_31" rx="12" stroke="var(--cool-stroke)" transform="translate(443.812, 148.321) scale(1, 0.63871) translate(-443.812, -148.321) matrix(1, 0, 0, 1, 444.266, 7.8661)" width="200" x="0.91" y="-86.82"/>
  <text class="ctitle" font-size="16" id="svg_34" transform="matrix(1, 0, 0, 1, 444.266, 7.8661)" x="16.91" y="16.55">Quantified trust</text>
  <text class="tag" fill="var(--cool-2)" font-size="12.5" id="svg_35" transform="matrix(1, 0, 0, 1, 444.266, 7.8661)" x="16.91" y="34.55">verify · validate · UQ</text>
  <text class="cbody" font-size="14.5" id="svg_36" transform="matrix(1, 0, 0, 1, 444.266, 7.8661)" x="16.91" y="54.55">Validation and UQ make</text>
  <text class="cbody" font-size="14.5" id="svg_37" transform="matrix(1, 0, 0, 1, 444.266, 7.8661)" x="16.91" y="70.55">predictions trustworthy.</text>
  <g fill="none" id="svg_38" stroke="var(--cool-2)" stroke-width="1.6" transform="translate(0.909091, -55.4545) translate(0, -0.520833) translate(0, -0.520833) translate(0, -0.520833) translate(-0.520833) translate(-0.520833) translate(-0.520833) translate(-0.520833) translate(-0.520833) translate(-0.520833) translate(-0.520833) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(-1.0989) translate(0, 1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989) translate(0, -1.0989)">
