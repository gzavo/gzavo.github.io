<svg width="680" height="345" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
 <title>Research strategy: three pillars for Digital Twins in Healthcare</title>
 <desc>Infographic showing three synergistic research pillars — high-performance computing, fundamental biomedicine, and clinical applications — converging into Digital Twins in Healthcare.</desc>
 <defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
   <path d="m2,1l6,4l-6,4" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="svg_1"/>
  </marker>
 </defs>
 <!-- Top eyebrow -->
 <!-- Pillar I: High-performance computing -->
 <!-- Pillar II: Fundamental biomedicine -->
 <!-- Pillar III: Clinical applications -->
 <!-- Convergence arrows -->
 <!-- Central hub: Digital Twins in Healthcare -->
